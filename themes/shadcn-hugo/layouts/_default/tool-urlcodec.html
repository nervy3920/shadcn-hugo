{{ define "main" }}
<div class="container py-10">
  <div class="mx-auto max-w-[980px] space-y-8">
    <a href="/tools/" class="inline-flex items-center gap-2 rounded-lg border bg-background px-3 py-1.5 text-sm font-medium hover:bg-accent transition-colors">
      <i class="fa-solid fa-arrow-left"></i>
      返回工具中心
    </a>
    <section class="relative overflow-hidden rounded-3xl border bg-card p-6 md:p-8 shadow-sm">
      <div class="pointer-events-none absolute inset-0 bg-gradient-to-br from-indigo-500/10 via-transparent to-sky-500/10"></div>
      <div class="relative space-y-3">
        <div class="inline-flex items-center gap-2 rounded-full border bg-background/80 px-3 py-1 text-xs font-medium text-muted-foreground">
          <i class="fa-solid fa-globe text-primary"></i>
          URL 工具
        </div>
        <h1 class="text-3xl font-bold tracking-tight md:text-4xl">{{ .Title }}</h1>
        <p class="text-lg text-muted-foreground">{{ .Description | default "URL Encode / Decode 在线转换。" }}</p>
      </div>
    </section>

    <div class="rounded-2xl border bg-card p-5 md:p-6 shadow-sm space-y-4">
      <div class="space-y-2">
        <label for="urlcodec-input" class="text-sm font-medium">输入内容</label>
        <textarea id="urlcodec-input" rows="7" class="w-full rounded-xl border bg-background px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-ring" placeholder="例如：https://example.com/search?q=你好&sort=desc"></textarea>
      </div>

      <div class="flex flex-wrap gap-2">
        <button id="url-encode" class="inline-flex items-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground hover:bg-primary/90 transition-colors">Encode</button>
        <button id="url-decode" class="inline-flex items-center rounded-lg border px-4 py-2 text-sm font-medium hover:bg-accent transition-colors">Decode</button>
        <button id="url-copy" class="inline-flex items-center rounded-lg border px-4 py-2 text-sm font-medium hover:bg-accent transition-colors">复制结果</button>
        <button id="url-clear" class="inline-flex items-center rounded-lg border px-4 py-2 text-sm font-medium hover:bg-accent transition-colors">清空</button>
      </div>

      <div class="space-y-2">
        <label for="urlcodec-output" class="text-sm font-medium">输出结果</label>
        <textarea id="urlcodec-output" rows="7" class="w-full rounded-xl border bg-background px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-ring"></textarea>
      </div>

      <div id="urlcodec-msg" class="hidden rounded-lg border px-3 py-2 text-sm"></div>
    </div>
  </div>
</div>

<script>
(function () {
  function byId(id) { return document.getElementById(id); }

  async function copyText(text) {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return;
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (!ok) throw new Error('copy failed');
  }

  function showMsg(text, type) {
    const el = byId('urlcodec-msg');
    el.textContent = text;
    el.classList.remove('hidden', 'border-red-400/30', 'bg-red-50/50', 'text-red-700', 'border-green-400/30', 'bg-green-50/50', 'text-green-700', 'border-amber-400/30', 'bg-amber-50/50', 'text-amber-700');
    if (type === 'error') {
      el.classList.add('border-red-400/30', 'bg-red-50/50', 'text-red-700');
      return;
    }
    if (type === 'success') {
      el.classList.add('border-green-400/30', 'bg-green-50/50', 'text-green-700');
      return;
    }
    el.classList.add('border-amber-400/30', 'bg-amber-50/50', 'text-amber-700');
  }

  function doEncode() {
    const raw = byId('urlcodec-input').value;
    byId('urlcodec-output').value = encodeURIComponent(raw);
    showMsg('编码完成。', 'success');
  }

  function doDecode() {
    const raw = byId('urlcodec-input').value.trim() || byId('urlcodec-output').value.trim();
    if (!raw) {
      showMsg('请输入需要解码的内容。', 'error');
      return;
    }
    try {
      byId('urlcodec-output').value = decodeURIComponent(raw);
      showMsg('解码完成。', 'success');
    } catch (e) {
      showMsg('内容不是合法的 URL 编码字符串。', 'error');
    }
  }

  byId('url-encode').addEventListener('click', doEncode);
  byId('url-decode').addEventListener('click', doDecode);
  byId('url-clear').addEventListener('click', function () {
    byId('urlcodec-input').value = '';
    byId('urlcodec-output').value = '';
    showMsg('已清空。', 'success');
  });
  byId('url-copy').addEventListener('click', async function () {
    const text = byId('urlcodec-output').value;
    if (!text) {
      showMsg('输出为空，无法复制。', 'error');
      return;
    }
    try {
      await copyText(text);
      showMsg('复制成功。', 'success');
    } catch (e) {
      showMsg('复制失败，请手动复制。', 'error');
    }
  });
})();
</script>
{{ end }}
