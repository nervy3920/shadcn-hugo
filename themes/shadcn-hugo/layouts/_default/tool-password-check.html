{{ define "main" }}
<div class="container py-10">
  <div class="mx-auto max-w-[980px] space-y-8">
    <a href="/tools/" class="inline-flex items-center gap-2 rounded-lg border bg-background px-3 py-1.5 text-sm font-medium hover:bg-accent transition-colors">
      <i class="fa-solid fa-arrow-left"></i>
      返回工具中心
    </a>
    <section class="relative overflow-hidden rounded-3xl border bg-card p-6 md:p-8 shadow-sm">
      <div class="pointer-events-none absolute inset-0 bg-gradient-to-br from-rose-500/10 via-transparent to-orange-500/10"></div>
      <div class="relative space-y-3">
        <div class="inline-flex items-center gap-2 rounded-full border bg-background/80 px-3 py-1 text-xs font-medium text-muted-foreground">
          <i class="fa-solid fa-shield-halved text-primary"></i>
          本地检测 · 隐私安全
        </div>
        <h1 class="text-3xl font-bold tracking-tight md:text-4xl">{{ .Title }}</h1>
        <p class="text-lg text-muted-foreground">{{ .Description | default "检测密码复杂度并给出优化建议。" }}</p>
      </div>
    </section>

    <div class="rounded-2xl border bg-card p-5 md:p-6 shadow-sm space-y-5">
      <div class="space-y-2">
        <label for="pwd-input" class="text-sm font-medium">输入密码（仅本地检测，不上传）</label>
        <div class="grid grid-cols-[1fr_auto] gap-2">
          <input id="pwd-input" type="password" autocomplete="off" placeholder="输入你的密码..." class="w-full rounded-xl border bg-background px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-ring" />
          <button id="pwd-toggle" type="button" class="inline-flex items-center justify-center rounded-xl border px-3 py-2.5 text-sm font-medium hover:bg-accent transition-colors">显示</button>
        </div>
      </div>

      <div class="rounded-xl border bg-background/70 p-4 space-y-2">
        <div class="flex items-center justify-between text-sm">
          <span class="font-medium">强度评分</span>
          <span id="pwd-level" class="font-semibold text-muted-foreground">等待输入</span>
        </div>
        <div class="h-2.5 overflow-hidden rounded-full bg-muted">
          <div id="pwd-bar" class="h-full w-0 bg-red-500 transition-all duration-300"></div>
        </div>
        <div id="pwd-score" class="text-sm text-muted-foreground">请输入密码开始检测。</div>
      </div>

      <div class="rounded-xl border bg-background p-4">
        <h2 class="text-sm font-semibold flex items-center gap-2">
          <i class="fa-solid fa-lightbulb text-amber-500"></i>
          改进建议
        </h2>
        <ul id="pwd-tips" class="mt-2 space-y-1 text-sm text-muted-foreground"></ul>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  function byId(id) { return document.getElementById(id); }

  function checkPassword(value) {
    const pwd = value || '';
    let score = 0;
    const tips = [];

    if (pwd.length >= 8) score += 20; else tips.push('长度至少 8 位。');
    if (pwd.length >= 12) score += 15; else tips.push('建议达到 12 位以上。');
    if (/[a-z]/.test(pwd)) score += 15; else tips.push('增加小写字母。');
    if (/[A-Z]/.test(pwd)) score += 15; else tips.push('增加大写字母。');
    if (/\d/.test(pwd)) score += 15; else tips.push('增加数字。');
    if (/[^A-Za-z0-9]/.test(pwd)) score += 15; else tips.push('增加特殊符号，如 !@#。');
    if (!/(.)\1{2,}/.test(pwd)) score += 5; else tips.push('避免连续重复字符。');

    if (!pwd) {
      return { score: 0, level: '等待输入', tips: ['输入密码后显示检测结果。'] };
    }

    let level = '弱';
    if (score >= 80) level = '强';
    else if (score >= 55) level = '中';

    return { score: Math.min(score, 100), level: level, tips: tips.length ? tips : ['当前密码复杂度较好，建议不要在多个网站复用。'] };
  }

  function render(result) {
    const bar = byId('pwd-bar');
    const level = byId('pwd-level');
    const score = byId('pwd-score');
    const tips = byId('pwd-tips');

    bar.style.width = result.score + '%';
    bar.classList.remove('bg-red-500', 'bg-amber-500', 'bg-emerald-500');
    if (result.score >= 80) bar.classList.add('bg-emerald-500');
    else if (result.score >= 55) bar.classList.add('bg-amber-500');
    else bar.classList.add('bg-red-500');

    level.textContent = result.level;
    level.classList.remove('text-red-600', 'text-amber-600', 'text-emerald-600', 'text-muted-foreground');
    if (result.level === '强') level.classList.add('text-emerald-600');
    else if (result.level === '中') level.classList.add('text-amber-600');
    else if (result.level === '弱') level.classList.add('text-red-600');
    else level.classList.add('text-muted-foreground');

    score.textContent = '评分：' + result.score + '/100';
    tips.innerHTML = result.tips.map(function (tip) {
      return '<li>' + tip.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;') + '</li>';
    }).join('');
  }

  byId('pwd-input').addEventListener('input', function (e) {
    render(checkPassword(e.target.value));
  });

  byId('pwd-toggle').addEventListener('click', function () {
    const input = byId('pwd-input');
    const isPwd = input.type === 'password';
    input.type = isPwd ? 'text' : 'password';
    byId('pwd-toggle').textContent = isPwd ? '隐藏' : '显示';
  });

  render(checkPassword(''));
})();
</script>
{{ end }}
